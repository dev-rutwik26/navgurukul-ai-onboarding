name: "🐛 Bug Report"
description: "Report a bug or unexpected behaviour"
title: "[BUG] <Short description>"
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible to help us reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "The STT pipeline crashes when the user speaks for more than 10 seconds on a 4GB RAM device."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Step-by-step instructions to reproduce the behaviour."
      placeholder: |
        1. Open the app on a device with 4GB RAM
        2. Click the microphone button
        3. Speak continuously for 10+ seconds
        4. Observe the crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behaviour"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behaviour"
      description: "What actually happened? Include error messages, stack traces, screenshots."
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Environment"
      description: "OS, browser, device RAM, Node/Python version"
      placeholder: "macOS 14, Chrome 125, 8GB RAM, Node 18.17, Python 3.10"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs / Stack Trace"
      description: "Paste any relevant console output or error logs."
      render: shell
    validations:
      required: false

  - type: input
    id: notion_link
    attributes:
      label: "Notion Task / PR Link"
      description: "Link to a related Notion task or PR if applicable"
    validations:
      required: false
